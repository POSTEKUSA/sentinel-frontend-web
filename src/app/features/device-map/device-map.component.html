<div class="map-wrapper">

  <div class="map-header">
    <h1 class="page-title"><mat-icon>map</mat-icon> Device Map</h1>
    <span class="map-subtitle" *ngIf="!filteredDevice">OpenStreetMap · Leaflet</span>
    <span class="filter-badge" *ngIf="filteredDevice">
      <mat-icon class="filter-icon">filter_alt</mat-icon>
      Filtered: <strong>{{ filteredDevice.metadata.alias }}</strong>
      <button class="clear-filter-btn" (click)="clearFilter()" title="Clear filter">
        <mat-icon>close</mat-icon>
      </button>
    </span>
  </div>

  <div class="map-container">
    <!-- Loading overlay -->
    <div *ngIf="loading" class="map-loading">
      <mat-spinner diameter="36"></mat-spinner>
      <p>Loading devices…</p>
    </div>

    <!-- Leaflet map -->
    <div id="leaflet-map" class="leaflet-map"></div>

    <!-- Legend -->
    <div class="map-legend">
      <div class="legend-title">Status</div>
      <div class="legend-item">
        <span class="dot online"></span> Online
      </div>
      <div class="legend-item">
        <span class="dot delayed"></span> Delayed
      </div>
      <div class="legend-item">
        <span class="dot offline"></span> Offline
      </div>
    </div>
  </div>

</div>
