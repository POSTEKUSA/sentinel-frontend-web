<div class="map-wrapper">

  <div class="map-header">
    <span class="map-subtitle" *ngIf="!filteredDevice">OpenStreetMap · Leaflet</span>
    <span class="filter-badge" *ngIf="filteredDevice">
      <mat-icon class="filter-icon">filter_alt</mat-icon>
      Filtrado: <strong>{{ filteredDevice.metadata.alias }}</strong>
      <button class="clear-filter-btn" (click)="clearFilter()" title="Quitar filtro">
        <mat-icon>close</mat-icon>
      </button>
    </span>
  </div>

  <div class="map-container">
    <!-- Loading overlay -->
    <div *ngIf="loading" class="map-loading">
      <app-busy-loader [show]="true" [inline]="true"></app-busy-loader>
    </div>

    <!-- Leaflet map -->
    <div id="leaflet-map" class="leaflet-map"></div>

    <!-- Legend -->
    <div class="map-legend">
      <div class="legend-title">Estado</div>
      <div class="legend-item">
        <span class="dot online"></span> En línea
      </div>
      <div class="legend-item">
        <span class="dot delayed"></span> Retrasado
      </div>
      <div class="legend-item">
        <span class="dot offline"></span> Fuera de línea
      </div>
    </div>
  </div>

</div>
